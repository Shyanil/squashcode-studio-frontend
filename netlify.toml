[build]
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  VITE_API_URL = "https://squashcode-studio-backend.onrender.com/api"
  VITE_AUTH_REDIRECT_URL = "https://squashcode-studio.netlify.app/creative-generator"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
