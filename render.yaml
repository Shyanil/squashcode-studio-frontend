services:
  - type: web
    name: squashcode-studio-frontend
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_URL
        value: https://api.squashcode-studio.7sc.in/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
