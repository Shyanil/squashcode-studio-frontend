services:
  - type: web
    name: squashcode-studio-frontend
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_URL
        value: https://api.squashcode-studio.7sc.in/api
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_AUTH_REDIRECT_URL
        value: https://squashcode-studio.7sc.in/creative-generator
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
